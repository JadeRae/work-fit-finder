  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function valueKey(value) {
    return value === null ? "unsure" : String(value);
  }

  function keyValue(key) {
    if (key === "unsure") return null;
    if (/^-?\d+(\.\d+)?$/.test(key)) return Number(key);

  function canContinue(question) {
    state.error = "";
    if (question.type === "interests") {
      if (state.interests.size < 3 || state.interests.size > 6) {
        state.error = "Choose between 3 and 6 activities before continuing.";
        return false;
      }
      return true;
    }
    if (question.type === "limits") return true;
    if (!Object.prototype.hasOwnProperty.call(state.answers, question.id)) {
      state.error = "Choose an answer before continuing. “Not sure yet” is available when appropriate.";
      return false;
    }
    return true;
  }

  function calculateDimensions() {
    const totals = {};
    const weights = {};
    const add = (dim, value, weight) => {
      if (value === null || value === undefined) return;
      totals[dim] = (totals[dim] || 0) + value * weight;
      weights[dim] = (weights[dim] || 0) + weight;
    };

    questions.forEach((question) => {
      if (question.type === "likert") {
        const answer = state.answers[question.id];
        if (answer === null || answer === undefined) return;
        Object.entries(question.dims).forEach(([dim, weight]) => add(dim, answer, weight));
      }
      if (["scenario", "task"].includes(question.type)) {
        const selected = question.options.find((option) => option.value === state.answers[question.id]);
        if (!selected || !selected.scores) return;
        Object.entries(selected.scores).forEach(([dim, value]) => add(dim, value, 1));
      }
    });

    return Object.keys(dimensionMeta).reduce((result, dim) => {
      const average = weights[dim] ? totals[dim] / weights[dim] : 3;
      result[dim] = Math.round(((average - 1) / 4) * 100);
      return result;
    }, {});
  }

  function environmentPreferences() {
    const ids = ["pace", "people", "structure", "setting", "schedule", "emotion"];
    return ids.reduce((prefs, id) => {
      const value = state.answers[id];
      prefs[id] = value === null || value === undefined ? 2 : value;
      return prefs;
    }, {});
  }

  function weightedAverage(values, weights) {
    let total = 0;
    let weightTotal = 0;
    Object.entries(weights).forEach(([key, weight]) => {
      total += (values[key] ?? 50) * weight;
      weightTotal += weight;
    });
    return weightTotal ? total / weightTotal : 50;
  }

  function scoreJobs(dimensions) {
    const prefs = environmentPreferences();
    const interestScores = Object.keys(interestMeta).reduce((result, id) => {
      result[id] = state.interests.has(id) ? 100 : 20;
      return result;
    }, {});

    return jobs.map((job) => {
      const ability = weightedAverage(dimensions, job.abilities);
      const interest = weightedAverage(interestScores, job.interests);
      const envParts = Object.entries(job.env).map(([key, required]) => 100 - Math.abs(prefs[key] - required) * 38);
      const environment = envParts.reduce((sum, value) => sum + value, 0) / envParts.length;
      const conflicts = job.tags.filter((tag) => state.hardNos.has(tag));
      const penalty = Math.min(45, conflicts.length * 18);
      const score = Math.max(0, Math.round(interest * 0.42 + ability * 0.38 + environment * 0.2 - penalty));
      return { ...job, score, ability, interest, environment, conflicts };
    }).sort((a, b) => b.score - a.score);
  }

  function signalLabel(score, conflicts) {
    if (conflicts && conflicts.length) return "Conditional fit";
    if (score >= 76) return "Strong lead";
    if (score >= 62) return "Promising lead";
    return "Worth exploring";
  }

  function localSearchUrl(job) {
    const query = encodeURIComponent(job.search || job.title);
    return `https://www.indeed.com/jobs?q=${query}&l=River%20Falls%2C%20WI&radius=50`;
  }

  function selectedTierJobs(tier, scoredJobs, limit = 5) {
    const candidates = scoredJobs.filter((job) => job.tier === tier);
    const selected = [];
    const familyCounts = {};
    for (let familyLimit = 1; selected.length < limit && familyLimit <= limit; familyLimit += 1) {
      candidates.forEach((job) => {
        if (selected.length >= limit || selected.includes(job)) return;
        const family = job.family || "Other paths";
        if ((familyCounts[family] || 0) >= familyLimit) return;
        selected.push(job);
        familyCounts[family] = (familyCounts[family] || 0) + 1;
      });
    }
    return selected;
  }

    const phrases = {

      people: {

      setting: {

        3: "a busy, noisy setting"
      },

      },
      emotion: {
        1: "low emotional intensity",
        2: "occasional hard moments with recovery time",
        3: "frequent emotionally difficult situations"
      }
    };
    const prefs = environmentPreferences();
    return ["pace", "people", "structure", "setting", "schedule", "emotion"]
      .map((id) => phrases[id][prefs[id]])
      .join(", ");
  }

  function matchedStrengths(job, dimensions) {
    const ranked = Object.keys(job.abilities)
      .sort((a, b) => (dimensions[b] * job.abilities[b]) - (dimensions[a] * job.abilities[a]))
      .slice(0, 2)
      .map((dim) => dimensionMeta[dim].label.toLowerCase());
    const matchedInterests = Object.keys(job.interests)
      .filter((id) => state.interests.has(id))
      .sort((a, b) => job.interests[b] - job.interests[a])
      .slice(0, 1)
      .map((id) => interestMeta[id]);
    const pieces = [...matchedInterests, ...ranked];
    return pieces.length ? `Matches your signals for ${pieces.join(", ")}.` : "This path is worth a closer look based on the overall pattern.";
  }

  function conflictText(job) {
    if (!job.conflicts.length) return job.watch;
    const labels = job.conflicts.map((tag) => hardNoOptions.find((item) => item.id === tag)?.label.toLowerCase()).filter(Boolean);
    return `You marked ${labels.join(" and ")} as a condition to avoid. ${job.watch}`;
  }

  function resultSummaryText(dimensions, scoredJobs) {
    const strengths = Object.entries(dimensions).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const strains = Object.entries(dimensions).sort((a, b) => a[1] - b[1]).filter(([, score]) => score < 65).slice(0, 2);
    const tierLabels = { now: "Possible now", training: "Short training", long: "Longer path" };
    const lines = [
      "WORK FIT FINDER — RESULT SUMMARY",
      "",
      "Strongest signals:",
      ...strengths.map(([dim]) => `- ${dimensionMeta[dim].label}`),
      "",
      "Conditions that may help:",
      `- ${environmentSummary()}`,
      "",
      "Possible strain points:",
      ...(strains.length ? strains.map(([dim]) => `- ${dimensionMeta[dim].strain}`) : ["- No strong strain signal appeared in these answers."]),
      "",
      "Leading paths by preparation level:"
    ];
    Object.entries(tierLabels).forEach(([tier, label]) => {
      lines.push(label + ":");
      selectedTierJobs(tier, scoredJobs).forEach((job) => {
        lines.push(`- ${job.title} — ${job.family}; ${localMarketMeta[job.market].label}; ${job.training}`);
        lines.push(`  Current 50-mile search: ${localSearchUrl(job)}`);
      });
    });
    if (state.note.trim()) lines.push("", `Something people rely on me for: ${state.note.trim()}`);
    lines.push("", "This result is an exploration guide, not a diagnosis or final career decision.");
    return lines.join("\n");
  }

  function answerText(question) {
    if (question.type === "interests") {
      const selected = Object.entries(interestMeta)
        .filter(([id]) => state.interests.has(id))
        .map(([, label]) => label);
      return selected.length ? selected.join("; ") : "None selected";
    }
    if (question.type === "limits") {
      const selected = hardNoOptions
        .filter((option) => state.hardNos.has(option.id))
        .map((option) => option.label);
      return selected.length ? selected.join("; ") : "No firm limits marked";
    }
    const value = state.answers[question.id];
    const options = question.type === "likert" ? likertOptions : question.options;
    const selected = options.find((option) => option.value === value);
    return selected ? selected.label : "No answer";
  }

  function answerReviewHtml() {
    let currentSection = "";
    return questions.map((question) => {
      const sectionHeading = question.section !== currentSection
        ? `<h3>${escapeHtml(question.section)}</h3>`
        : "";
      currentSection = question.section;
      return `
        ${sectionHeading}
        <div class="wff-answer-review-item">
          <strong>${escapeHtml(question.prompt)}</strong>
          <span>${escapeHtml(answerText(question))}</span>
        </div>
      `;
    }).join("");
  }

  function fullReportText(dimensions, scoredJobs) {
    const lines = [resultSummaryText(dimensions, scoredJobs), "", "FULL ANSWER REVIEW"];
    let currentSection = "";
    questions.forEach((question) => {
      if (question.section !== currentSection) {
        currentSection = question.section;
        lines.push("", currentSection.toUpperCase());
      }
      lines.push(`Question: ${question.prompt}`, `Answer: ${answerText(question)}`, "");
    });
    if (state.note.trim()) {
      lines.push("OPTIONAL NOTE", `People often rely on me to: ${state.note.trim()}`, "");
    }
    lines.push("Report created locally by Work Fit Finder. No answers were transmitted or stored by the site.");
    return lines.join("\n");
  }

  function renderResults() {
    const dimensions = calculateDimensions();
    const scoredJobs = scoreJobs(dimensions);
    const strengths = Object.entries(dimensions).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const strains = Object.entries(dimensions).sort((a, b) => a[1] - b[1]).filter(([, score]) => score < 65).slice(0, 2);
    const tierLabels = {
      now: "Possible now",
      training: "Short training",
      long: "Longer path"
    };

    root.innerHTML = `
      <div class="wff-shell">
        <div>
          <span class="viz-badge">Your work-fit snapshot</span>
          <h2>Use this result to choose what to test next</h2>
          <p class="text-muted">The strongest result is not automatically the right job. A good next step is a tour, job shadow, volunteer shift, or short class that tests the work environment before making a large commitment.</p>
        </div>

        <div class="wff-summary-grid">
          <section class="card wff-result-section" aria-labelledby="wff-strength-heading">
            <h3 id="wff-strength-heading">Strongest signals</h3>
            <div class="wff-signal-list">
              ${strengths.map(([dim, score]) => `
                <div class="wff-signal">
                  <div class="wff-job-heading">
                    <strong>${escapeHtml(dimensionMeta[dim].label)}</strong>
                    <span class="text-small text-muted">${score}/100</span>
                  </div>
                  <div class="wff-meter" aria-label="${escapeHtml(dimensionMeta[dim].label)} score ${score} out of 100">
                    <div class="wff-meter-fill" style="width:${score}%"></div>
                  </div>
                  <span class="text-small">${escapeHtml(dimensionMeta[dim].strength)}</span>
                </div>
              `).join("")}
            </div>
          </section>

          <section class="card wff-result-section" aria-labelledby="wff-strain-heading">
            <h3 id="wff-strain-heading">Possible strain points</h3>
            ${strains.length ? strains.map(([dim]) => `
                <div>
                  <strong>${escapeHtml(dimensionMeta[dim].label)}</strong>
                  <p>${escapeHtml(dimensionMeta[dim].strain)}</p>
                </div>
              `).join("") : `<p>No strong strain signal appeared in these answers. Real-world trials are still more useful than a quiz score.</p>`}
            ${strains.length ? `<p class="text-muted">A strain point can mean “use support or choose the setting carefully.” It does not mean “you cannot do this.”</p>` : ""}
          </section>
        </div>

        <section class="card wff-result-section" aria-labelledby="wff-setting-heading">
          <h3 id="wff-setting-heading">Conditions that may help you do your best</h3>
          <p>${escapeHtml(environmentSummary())}.</p>
          ${state.note.trim() ? `<p class="wff-note"><strong>People often rely on me to:</strong> ${escapeHtml(state.note.trim())}</p>` : ""}
        </section>

        <section class="card wff-result-section" aria-labelledby="wff-job-heading">
          <div>
            <h3 id="wff-job-heading">Career and job leads</h3>
            <p class="text-muted">These are ranked by interests, work skills, preferred environment, and conditions you marked to avoid. To prevent a narrow list, the leads include several career families before repeating one. Local availability is shown separately and does not change personal-fit scores.</p>
          </div>
          <div class="wff-tabs wff-no-print" role="tablist" aria-label="Career preparation level">
            ${Object.entries(tierLabels).map(([tier, label]) => `
              <button class="btn${state.resultTier === tier ? " btn-primary" : ""}" type="button" role="tab" aria-selected="${state.resultTier === tier}" aria-controls="wff-tier-${tier}" data-action="tier" data-tier="${tier}">${escapeHtml(label)}</button>
            `).join("")}
          </div>
          ${Object.entries(tierLabels).map(([tier, label]) => `
            <div class="wff-tier-panel wff-result-section" id="wff-tier-${tier}" role="tabpanel" ${state.resultTier === tier ? "" : "hidden"}>
              <h3>${escapeHtml(label)}</h3>
              <div class="wff-job-list">
                ${tierJobsHtml(tier, dimensions, scoredJobs)}
              </div>
            </div>
          `).join("")}
        </section>

        <section class="card wff-result-section">
          <h3>A sensible next test</h3>
          <ol>
            <li>Choose one “Possible now” lead and one training path.</li>
            <li>Read three real local job postings for each. Compare pace, noise, schedule, people contact, and physical demands—not only the job title.</li>
            <li>Try the environment in a small, reversible way before committing to a program.</li>
          </ol>
        </section>

        <p class="text-small text-muted">Local-market labels are regional guidance for the area within about 50 miles of River Falls and were reviewed in July 2026. Openings change, so use each live search link before choosing a path.</p>
        <div class="wff-link-row">
          <a class="wff-source-link" href="https://dwd.wisconsin.gov/det/jobseeker.htm" target="_blank" rel="noreferrer">Wisconsin career and job tools</a>
          <a class="wff-source-link" href="https://mn.gov/deed/data/data-tools/oid/" target="_blank" rel="noreferrer">Twin Cities occupation demand</a>
        </div>

        <section class="card wff-result-section wff-print-only" aria-labelledby="wff-answer-review-heading">
          <h2 id="wff-answer-review-heading">Complete answer review</h2>
          <div class="wff-answer-review-list">
            ${answerReviewHtml()}
          </div>
        </section>

        <div class="wff-actions wff-no-print">
          <button class="btn btn-ghost" type="button" data-action="restart">Start over</button>
          <div class="wff-actions-end">
            <button class="btn" type="button" data-action="copy">Copy summary</button>
            <button class="btn" type="button" data-action="download">Download full report</button>
            <button class="btn btn-primary" type="button" data-action="print">Print or save as PDF</button>
          </div>
        </div>
        <p class="text-small text-muted">Career descriptions link to O*NET. Education requirements and work conditions vary by employer and location. Results are not stored automatically; download or print the report before closing the page.</p>
      </div>
    `;

    root.dataset.summary = resultSummaryText(dimensions, scoredJobs);
    root.dataset.fullReport = fullReportText(dimensions, scoredJobs);
  }

  function renderPause() {
    root.innerHTML = `
      <div class="wff-shell">
        <div class="card wff-question">
          <div>
            <span class="viz-badge">Paused at question ${state.index + 1} of ${questions.length}</span>
            <h2>Take the time you need</h2>
            <p>Your answers will remain here as long as this page stays open. Refreshing or closing the page will clear them.</p>
          </div>
        </div>
        <div class="wff-actions">
          <span></span>
          <button class="btn btn-primary" type="button" data-action="resume">Continue</button>
        </div>
      </div>
    `;
  }

  function render() {
    if (state.view === "intro") renderIntro();
    if (state.view === "question") renderQuestion();
    if (state.view === "pause") renderPause();
    if (state.view === "results") renderResults();
  }

  root.addEventListener("click", async (event) => {
    const button = event.target.closest("[data-action]");
    if (!button) return;
    const action = button.dataset.action;

    if (action === "start") {
      state.view = "question";
      state.index = 0;
      state.error = "";
      render();
      return;
    }

    if (action === "answer") {
      const questionId = button.dataset.question;
      state.answers[questionId] = keyValue(button.dataset.value);
      state.error = "";
      render();
      return;
    }

    if (action === "next") {
      const question = questions[state.index];
      if (!canContinue(question)) {
        render();
        return;
      }
      if (state.index === questions.length - 1) {
        state.view = "results";
      } else {
        state.index += 1;
      }
      state.error = "";
      render();
      return;
    }

    if (action === "back") {
      state.error = "";
      if (state.index === 0) {
        state.view = "intro";
      } else {
        state.index -= 1;
      }
      render();
      return;
    }

    if (action === "pause") {
      state.view = "pause";
      render();
      return;
    }

    if (action === "resume") {
      state.view = "question";
      render();
      return;
    }

    if (action === "tier") {
      state.resultTier = button.dataset.tier;
      render();
      return;
    }

    if (action === "restart") {
      state.view = "intro";
      state.index = 0;
      state.answers = {};
      state.interests = new Set();
      state.hardNos = new Set();
      state.note = "";
      state.resultTier = "now";
      state.error = "";
      render();
      return;
    }

    if (action === "copy") {
      const summary = root.dataset.summary || "";
      try {
        await navigator.clipboard.writeText(summary);
        button.textContent = "Summary copied";
      } catch (error) {
        button.textContent = "Copy unavailable";
      }
      return;
    }

    if (action === "download") {
      const report = root.dataset.fullReport || "";
      const blob = new Blob([report], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `work-fit-finder-results-${new Date().toISOString().slice(0, 10)}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      button.textContent = "Full report downloaded";
      return;
    }

    if (action === "print") {
      window.print();
    }
  });

  root.addEventListener("change", (event) => {
    const input = event.target;
    if (!(input instanceof HTMLInputElement)) return;
    if (input.dataset.action === "interest") {
      if (input.checked) state.interests.add(input.value);
      else state.interests.delete(input.value);
      state.error = "";
      render();
    }
    if (input.dataset.action === "hard-no") {
      if (input.checked) state.hardNos.add(input.value);
      else state.hardNos.delete(input.value);
      state.error = "";
      render();
    }
  });

  root.addEventListener("input", (event) => {
    if (event.target.id === "wff-note") state.note = event.target.value;
  });

  render();
})();
</script>

<script id="codex-visualization-floating-ui-core" src="https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js"></script>
<script id="codex-visualization-floating-ui-dom" src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"></script>
<script id="codex-visualization-lucide" async src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js"></script>
<script id="codex-visualization-tooltip">/* oxlint-disable typescript/no-unsafe-argument, typescript/no-unsafe-call, typescript/no-unsafe-return */
// Runs inside the visualization sandbox, not the host webview.
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null && trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger && request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide-initialization">(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
